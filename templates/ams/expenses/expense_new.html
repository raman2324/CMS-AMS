{% extends "ams/base.html" %}
{% block title %}New Expense — AMS{% endblock %}

{% block ams_content %}
<div class="max-w-xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">New Expense Request</h1>
        <p class="text-gray-500 text-sm mt-1">Submit a misc expense for approval</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="post" enctype="multipart/form-data" id="expenseForm">
            {% csrf_token %}
            <input type="hidden" name="request_category" id="expense_category_input" value="">

            <!-- Category Selector -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-3">Expense Type</label>
                <div class="grid grid-cols-2 gap-3">
                    <div id="card-one_off"
                         class="border-2 border-gray-200 rounded-lg p-4 cursor-pointer transition hover:border-indigo-300"
                         onclick="showExpenseSection('one_off')">
                        <div class="font-medium text-gray-900">One-off</div>
                        <div class="text-sm text-gray-500 mt-1">Single purchase, equipment, event</div>
                    </div>
                    <div id="card-recurring"
                         class="border-2 border-gray-200 rounded-lg p-4 cursor-pointer transition hover:border-indigo-300"
                         onclick="showExpenseSection('recurring')">
                        <div class="font-medium text-gray-900">Recurring</div>
                        <div class="text-sm text-gray-500 mt-1">Regular expense, ongoing cost</div>
                    </div>
                </div>
            </div>

            <!-- One-off Fields -->
            <div id="one_off-fields" class="expense-section hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount (USD)</label>
                    <input type="number" name="cost" step="0.01" min="0"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500"
                           placeholder="Optional">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Justification *</label>
                    <textarea name="justification" rows="3" required
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500"
                              placeholder="Why is this expense needed?"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Receipt (optional)</label>
                    <input type="file" name="receipt" accept=".pdf,.jpg,.jpeg,.png"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
            </div>

            <!-- Recurring Fields -->
            <div id="recurring-fields" class="expense-section hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount Type</label>
                    <select name="amount_type"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500">
                        <option value="">Select...</option>
                        <option value="fixed">Fixed</option>
                        <option value="variable">Variable</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount (USD)</label>
                    <input type="number" name="cost" step="0.01" min="0"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500"
                           placeholder="Optional">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Justification *</label>
                    <textarea name="justification" rows="3" required
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500"
                              placeholder="Why is this expense needed?"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Receipt (optional)</label>
                    <input type="file" name="receipt" accept=".pdf,.jpg,.jpeg,.png"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
            </div>

            <div id="expense-submit-section" class="hidden mt-6 pt-4 border-t border-gray-100 flex justify-end gap-3">
                <a href="{% url 'ams_approvals:inbox' %}" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition">
                    Submit for Approval
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function showExpenseSection(type) {
    document.querySelectorAll('.expense-section').forEach(function(el) {
        el.classList.add('hidden');
    });

    document.getElementById('card-one_off').classList.remove('border-indigo-500', 'bg-indigo-50');
    document.getElementById('card-recurring').classList.remove('border-indigo-500', 'bg-indigo-50');
    document.getElementById('card-one_off').classList.add('border-gray-200');
    document.getElementById('card-recurring').classList.add('border-gray-200');

    document.getElementById(type + '-fields').classList.remove('hidden');
    var card = document.getElementById('card-' + type);
    card.classList.remove('border-gray-200');
    card.classList.add('border-indigo-500', 'bg-indigo-50');

    document.getElementById('expense_category_input').value = type;
    document.getElementById('expense-submit-section').classList.remove('hidden');
}

document.getElementById('expenseForm').addEventListener('submit', function() {
    document.querySelectorAll('.expense-section.hidden input, .expense-section.hidden select, .expense-section.hidden textarea').forEach(function(el) {
        el.disabled = true;
    });
});
</script>
{% endblock %}
