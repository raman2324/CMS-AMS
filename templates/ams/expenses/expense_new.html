{% extends "base.html" %}
{% block title %}New Expense — AMS{% endblock %}

{% block content %}
<div class="container-fluid px-0" style="max-width: 600px; margin: 0 auto;">
    <div class="mb-4 text-center">
        <h3 class="fw-bold text-dark">New Expense Request</h3>
        <p class="text-muted small">Submit a misc expense for approval</p>
    </div>

    <div class="card border-0 shadow-sm p-4">
        <form method="post" enctype="multipart/form-data" id="expenseForm">
            {% csrf_token %}
            <input type="hidden" name="request_category" id="expense_category_input" value="">

            <!-- Category Selector -->
            <div class="mb-4">
                <label class="form-label small fw-bold text-dark mb-2">Expense Type</label>
                <div class="row g-3">
                    <div class="col-sm-6">
                        <div id="card-one_off"
                             class="card border border-2 border-light-subtle h-100 cursor-pointer text-center py-4"
                             style="cursor: pointer; transition: all 0.2s;"
                             onclick="showExpenseSection('one_off')">
                            <h6 class="fw-bold mb-1">One-off</h6>
                            <p class="small text-muted mb-0">Single purchase, equipment, event</p>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div id="card-recurring"
                             class="card border border-2 border-light-subtle h-100 cursor-pointer text-center py-4"
                             style="cursor: pointer; transition: all 0.2s;"
                             onclick="showExpenseSection('recurring')">
                            <h6 class="fw-bold mb-1">Recurring</h6>
                            <p class="small text-muted mb-0">Regular expense, ongoing cost</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- One-off Fields -->
            <div id="one_off-fields" class="expense-section d-none">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Amount (USD)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">$</span>
                            <input type="number" name="cost" step="0.01" min="0" class="form-control" placeholder="Optional">
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Justification <span class="text-danger">*</span></label>
                        <textarea name="justification" rows="3" required class="form-control" placeholder="Why is this expense needed?"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Receipt <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="file" name="receipt" accept=".pdf,.jpg,.jpeg,.png" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Recurring Fields -->
            <div id="recurring-fields" class="expense-section d-none">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Amount Type</label>
                        <select name="amount_type" class="form-select">
                            <option value="">Select...</option>
                            <option value="fixed">Fixed</option>
                            <option value="variable">Variable</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Amount (USD)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">$</span>
                            <input type="number" name="cost" step="0.01" min="0" class="form-control" placeholder="Optional">
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Justification <span class="text-danger">*</span></label>
                        <textarea name="justification" rows="3" required class="form-control" placeholder="Why is this expense needed?"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Receipt <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="file" name="receipt" accept=".pdf,.jpg,.jpeg,.png" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Form Actions -->
            <div id="expense-submit-section" class="d-none mt-4 text-end">
                <a href="{% url 'ams_approvals:inbox' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                <button type="submit" class="btn btn-dark">Submit for Approval</button>
            </div>
        </form>
    </div>
</div>

<script>
function showExpenseSection(type) {
    document.querySelectorAll('.expense-section').forEach(function(el) {
        el.classList.add('d-none');
    });

    document.getElementById('card-one_off').classList.remove('border-primary', 'bg-primary-subtle');
    document.getElementById('card-recurring').classList.remove('border-primary', 'bg-primary-subtle');
    document.getElementById('card-one_off').classList.add('border-light-subtle');
    document.getElementById('card-recurring').classList.add('border-light-subtle');

    document.getElementById(type + '-fields').classList.remove('d-none');
    var card = document.getElementById('card-' + type);
    card.classList.remove('border-light-subtle');
    card.classList.add('border-primary', 'bg-primary-subtle');

    document.getElementById('expense_category_input').value = type;
    document.getElementById('expense-submit-section').classList.remove('d-none');
}

document.getElementById('expenseForm').addEventListener('submit', function() {
    document.querySelectorAll('.expense-section.d-none input, .expense-section.d-none select, .expense-section.d-none textarea').forEach(function(el) {
        el.disabled = true;
    });
});
</script>
{% endblock %}
