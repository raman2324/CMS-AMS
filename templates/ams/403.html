{% extends "ams/base.html" %}

    <div class="fw-bold text-secondary mb-3" style="font-size:5rem">403</div>
    <h4 class="fw-bold mb-2">Access Denied</h4>

        <i class="bi bi-arrow-left me-1"></i>Back to Inbox

{% endblock %}
