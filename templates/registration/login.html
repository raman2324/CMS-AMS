{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HR Document Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-file-earmark-text-fill text-warning" style="font-size:2.5rem"></i>
            <h4 class="mt-2 fw-bold">HR Document Platform</h4>
            <p class="text-muted small">Sign in to generate and manage letters</p>
          </div>

          {% if form.errors %}
          <div class="alert alert-danger py-2 small">
            Invalid username or password. Please try again.
          </div>
          {% endif %}

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" autofocus required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-dark w-100 mt-2">
              <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
            </button>
          </form>

          <hr class="my-3">
          <a href="{% url 'google_login' %}" class="btn btn-outline-dark w-100">
            <img src="https://www.google.com/favicon.ico" width="18" height="18" class="me-2">
            Sign in with Google
          </a>

        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
