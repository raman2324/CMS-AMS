{% if schema %}
<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">
    <h6 class="card-title fw-semibold mb-3">
      <span class="badge bg-dark me-2">3</span>Letter Details
    </h6>
    {% for field_name, field_def in schema.items %}
    <div class="mb-3">
      <label class="form-label fw-semibold" for="field_{{ field_name }}">
        {{ field_def.label }}
        {% if field_def.required %}<span class="text-danger">*</span>{% endif %}
      </label>
      {% if field_def.type == "date" %}
      <input type="date"
             name="{{ field_name }}"
             id="field_{{ field_name }}"
             class="form-control"
             value="{{ field_def.default|default:'' }}"
             {% if field_def.required %}required{% endif %}>
      {% elif field_def.type == "number" %}
      <input type="number"
             name="{{ field_name }}"
             id="field_{{ field_name }}"
             class="form-control"
             step="0.01"
             placeholder="{{ field_def.label }}"
             value="{{ field_def.default|default:'' }}"
             {% if field_def.required %}required{% endif %}>
      {% else %}
      <input type="text"
             name="{{ field_name }}"
             id="field_{{ field_name }}"
             class="form-control"
             placeholder="{{ field_def.label }}"
             value="{{ field_def.default|default:'' }}"
             {% if field_def.required %}required{% endif %}>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}
