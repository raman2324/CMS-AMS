{% if employees %}
<div class="list-group mt-1 shadow-sm" id="employee-dropdown">
  {% for emp in employees %}
  <button type="button"
          class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-2"
          data-employee-id="{{ emp.id }}"
          data-employee-name="{{ emp.name }}"
          data-employee-code="{{ emp.employee_code }}"
          data-employee-dept="{{ emp.department }}">
    <div>
      <strong>{{ emp.name }}</strong>
      <span class="text-muted ms-2 small">{{ emp.employee_code }}</span>
    </div>
    <div class="text-end small text-muted">
      <div>{{ emp.designation }}</div>
      <div>{{ emp.department }} · {{ emp.company.short_name }}</div>
    </div>
  </button>
  {% endfor %}
</div>
{% endif %}
