version: "3.9"

services:
  web:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - pdf_storage:/app/local_pdfs
      - ams_receipts_shared:/app/local_pdfs/shared_receipts
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,192.168.80.233
      - DOCUMENT_ENCRYPTION_KEY=jPt1rx-Lv_Ts7HYkUNnD9qtyADNzXhaiqL4qMJW4pnE=
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=cms_db
      - DB_USER=admin
      - DB_PASSWORD=secret
      - DB_HOST=shared_mysql
      - DB_PORT=3306
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shared_network

  db:
    image: mysql:8.0
    container_name: shared_mysql
    command: --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: cms_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - shared_network

volumes:
  pdf_storage:
  db_data:
  ams_receipts_shared:
    external: true

networks:
  shared_network:
    external: true
